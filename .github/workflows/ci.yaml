name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build and Generate Documenttion
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: jassielof/setup-zig@v1

      - name: Formatting
        run: zig fmt .

      - name: Build
        run: zig build --summary all

      - name: Build documentation
        run: zig build docs --summary all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: zig-out/docs
  tests:
    name: Run Test Suite
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: jassielof/setup-zig@v1

      - name: Run Tests
        run: zig build tests --summary all

  pages:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: tests
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
